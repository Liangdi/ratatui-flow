[package]
name = "tui-nodes"
version = "0.1.0"
edition = "2021"
authors = ["jaxter184 <jaxter184@gmail.com>"]
description = """
Node graph visualization for tui-rs
"""
documentation = "https://docs.rs/tui-nodes/0.19.0/tui-nodes/"
keywords = ["tui", "terminal"]
repository = "https://git.sr.ht/~jaxter184/tui-nodes"
readme = "README.md"
license = "MIT"

[dependencies]
tui = { version = "0.19", default-features = false }
log = "0.4.17"

[dev-dependencies]
crossterm = "0.25"
